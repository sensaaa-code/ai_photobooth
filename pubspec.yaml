name: ai_photobooth
description: AI Photobooth kiosk app (Flutter) - iPad M2 primary, Android test.
publish_to: "none"

version: 0.1.0+1

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # --- State management & routing ---
  flutter_riverpod: ^2.6.1
  go_router: ^14.2.0

  # --- Kiosk utilities ---
  wakelock_plus: ^1.2.8

  # --- Camera & local files ---
  camera: ^0.11.0+2
  path_provider: ^2.1.4
  path: ^1.9.0

  # --- Image processing (crop/compose/encode) ---
  image: ^4.2.0

  # --- ML Kit face detection (glasses overlay placement) ---
  google_mlkit_face_detection: ^0.12.0

  # --- Printing (Strategy A: render PDF 4x6 then print) ---
  pdf: ^3.11.0
  printing: ^5.13.0

  # --- Networking (simple server API for PIN consume/refund/health) ---
  http: ^1.2.2

  # --- JSON/model helpers (optional but helps clean code) ---
  equatable: ^2.0.5

  # --- UI helpers (optional) ---
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/templates/
    - assets/templates/thumbnails/
    - assets/overlays/
    - assets/branding/